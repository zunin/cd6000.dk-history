groups:
  - id: metric.cd6000_query_counter
    type: metric
    metric_name: cd6000.query.counter
    stability: stable
    brief: A counter of the number of queries to cd6000.dk.
    instrument: counter
    unit: "1"
    attributes:
      - ref: host.name
        requirement_level: required
      - ref: host.arch
        requirement_level: required
  - id: metric.musicbrainz_query_counter
    type: metric
    metric_name: musicbrainz.query.counter
    stability: stable
    brief: A counter of the number of queries to musicbrainz.org.
    instrument: counter
    unit: "1"
    attributes:
      - ref: host.name
        requirement_level: required
      - ref: host.arch
        requirement_level: required
